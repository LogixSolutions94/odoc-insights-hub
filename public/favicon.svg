  <!-- Sphère orbitale blanche centrée -->
  <g transform="translate(32,32)">
    <circle cx="0" cy="0" r="18" stroke="white" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" stroke="white" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="0" rx="7" ry="18" stroke="white" stroke-width="2" fill="none" transform="rotate(45)"/>
    <circle cx="0" cy="-18" r="2.5" fill="white"/>
    <circle cx="18" cy="0" r="2.5" fill="white"/>
    <circle cx="0" cy="18" r="2.5" fill="white"/>
    <circle cx="-18" cy="0" r="2.5" fill="white"/>
  </g>
</svg>
