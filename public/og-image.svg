<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2044;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#1a3a6b" opacity="0.3"/>
  <circle cx="150" cy="500" r="150" fill="#1a3a6b" opacity="0.2"/>

  <!-- Orange accent bar -->
  <rect x="80" y="240" width="6" height="80" rx="3" fill="url(#accent)" />

  <!-- Logo / Brand name -->
  <text x="110" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">OdocPilot</text>

  <!-- Tagline -->
  <text x="110" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">Votre employé IA. 24h/24.</text>

  <!-- Sub-description -->
  <text x="110" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#64748b">OS d'entreprise IA pour les TPE et PME françaises</text>

  <!-- Feature pills -->
  <rect x="110" y="470" width="120" height="36" rx="18" fill="#1e3a5f" stroke="#2d5a9e" stroke-width="1"/>
  <text x="170" y="493" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">GED</text>

  <rect x="244" y="470" width="160" height="36" rx="18" fill="#1e3a5f" stroke="#2d5a9e" stroke-width="1"/>
  <text x="324" y="493" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Facturation IA</text>

  <rect x="418" y="470" width="120" height="36" rx="18" fill="#1e3a5f" stroke="#2d5a9e" stroke-width="1"/>
  <text x="478" y="493" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">CRM</text>

  <rect x="552" y="470" width="160" height="36" rx="18" fill="#1e3a5f" stroke="#2d5a9e" stroke-width="1"/>
  <text x="632" y="493" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Odoc Brain</text>

  <rect x="726" y="470" width="160" height="36" rx="18" fill="#1e3a5f" stroke="#2d5a9e" stroke-width="1"/>
  <text x="806" y="493" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Trésorerie</text>

  <!-- Domain -->
  <text x="1090" y="590" font-family="system-ui, sans-serif" font-size="22" font-weight="500" fill="#475569" text-anchor="end">odocpilot.com</text>

  <!-- France flag hint -->
  <text x="110" y="590" font-family="system-ui, sans-serif" font-size="22" fill="#475569">🇫🇷 Made in France · RGPD</text>
</svg>
